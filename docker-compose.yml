services:
  windsurfpool:
    image: ${WINDSURFPOOL_IMAGE:-luka762/windsurfpool:latest}
    container_name: windsurfpool
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3003}:${PORT:-3003}"
    environment:
      PORT: ${PORT:-3003}
      API_KEY: ${API_KEY:-}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-}
      CODEIUM_API_KEY: ${CODEIUM_API_KEY:-}
      CODEIUM_AUTH_TOKEN: ${CODEIUM_AUTH_TOKEN:-}
      CODEIUM_API_URL: ${CODEIUM_API_URL:-https://server.self-serve.windsurf.com}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-claude-4.5-sonnet-thinking}
      MAX_TOKENS: ${MAX_TOKENS:-8192}
      LS_PORT: ${LS_PORT:-42100}
      LS_BINARY_PATH: ${LS_BINARY_PATH:-/opt/windsurf/language_server_linux_arm}
      LS_DATA_DIR: ${LS_DATA_DIR:-/app/data}
      LOG_DIR: ${LOG_DIR:-/app/logs}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CASCADE_MAX_HISTORY_BYTES: ${CASCADE_MAX_HISTORY_BYTES:-200000}
    volumes:
      # The closed-source Windsurf Language Server binary must exist on the host.
      - /opt/windsurf:/opt/windsurf:ro
      # Runtime state. These files must be writable by UID/GID 10001.
      - ./accounts.json:/app/accounts.json
      - ./stats.json:/app/stats.json
      - ./runtime-config.json:/app/runtime-config.json
      - ./proxy.json:/app/proxy.json
      - ./model-access.json:/app/model-access.json
      - ./logs:/app/logs
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
